name: Deploy Admin to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'sites/admin/**'
  workflow_dispatch:

jobs:
  deploy-admin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy Admin to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Yarn
        run: corepack enable && corepack prepare yarn@4.5.0 --activate

      - name: Install dependencies
        run: yarn install

      - name: Build admin
        run: cd sites/admin && yarn build

      - name: Deploy Admin to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: tennis-admin
          directory: sites/admin/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: 3
          command: pages publish sites/admin/dist --project-name=tennis-admin --commit-dirty=true
